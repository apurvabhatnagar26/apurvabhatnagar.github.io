bio: |
  I am a development economist with eight years of experience evaluating and improving health, nutrition, and social development programs across South Asia, Southeast Asia, and Africa.

  Much of my career has been spent in direct partnership with national and provincial governments, helping leadership teams understand how their programs are performing and identifying exactly where to focus their resources for maximum impact. Through these collaborations, my research has successfully transitioned into real-world policy — shaping government guidelines in Delhi, informing critical budget priorities in Uttar Pradesh, and influencing comprehensive program designs in the Philippines and Cambodia.

  Feel free to browse my recent work below, or reach out directly to discuss potential collaborations and share ideas.

