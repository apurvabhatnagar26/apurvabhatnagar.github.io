experience:
  - role: Development Economist / Technical Manager
    org: IDinsight
    start: 2021-04-01
    summary: |
      Lead technical work on impact and process evaluations across health,
      nutrition, education, financial inclusion, and social protection
      programmes in India, the Philippines, Cambodia, and Uganda.

      **Select projects:**

      #### Bill & Melinda Gates Foundation — IFS India Impact Measurement Initiative
      * Project manager

      I am managing a pan-India initiative measuring the Gates
      Foundation's Inclusive Financial Systems strategy. The project
      designed a nationally representative baseline survey covering 23
      states and union territories, 9,743 households, and 17,357
      individuals, with 250+ indicators spanning digital payments (UPI,
      AePS), savings, credit, insurance, pensions, and women's economic
      empowerment. We deployed voter-roll and GPS pin-drop sampling at
      national scale, generating state- and subgroup-level evidence for
      Foundation decision-making. I work on funder
      relationship, team management, budget, field operations, technical design,
      final analysis and dissemination.

      *Focus: Financial inclusion · Survey design · Project management*

      #### Government of Uttar Pradesh — State Scheme and Budget Review
      * Technical lead 

      In this project, we partner with senior UP officials to assess how well welfare schemes
      reach intended beneficiaries and whether budget allocations align
      with the state's growth priorities. For example, for a conditional cash transfer
      scheme for girls, we combined departmental administrative data, the
      state's Family ID database, rapid phone surveys, and targeted field
      visits to diagnose why coverage was low. Our recommendations could
      raise coverage from ~500,000 girls toward 1.5 million. We also
      support the state's Evaluation Division to institutionalise 
      scheme evaluations. In this project, I work as a sole economist and technical reviewer of all
      analysis produced by associates on the engagement.

      *Focus: Government advisory · Public finance · Scheme evaluation*

      #### Philippines Department of Health — Health Promotion and Literacy Study
      * Technical support and data-quality and analysis lead

      This is a nationally representative panel study with DOH's Health Promotion Bureau,
      tracking health literacy and KAP across seven priority pillars in
      all 17 regions of the Philippines using grid-based sampling. Our recommendations
      helped DOH to simplify its vaccination schedule, make changes to its policies on 
      vaping and HIV prevention. 
      We also led a dedicated Mental Health Literacy assessment (~4,600 respondents) using a
      vignette-based instrument aligned to the WHO mhGAP conditions,
      plus qualitative studies on the HIV care continuum and youth
      vaping in Metro Manila. I owned the data-quality systems, cleaning, analysis, and
      visualisation pipelines for four rounds of this panel study.

      *Focus: Panel survey · Data quality · Analysis pipelines*

      #### StrongMinds Uganda — Randomised Evaluation of a Group Mental Health Programme
      * Technical support, RCT design

      We are working on a village-level cluster RCT of
      StrongMinds' six-week, lay-led Group Interpersonal Psychotherapy
      programme for depression, running across ~100 villages in Luuka
      and Buikwe districts (1,112 PHQ-9-screened participants) against
      an Enhanced Treatment-as-Usual control. I am working on the pre-analysis
      plan, randomisation, power calculations, outcome measurement,
      instrument design, survey protocol, and IRB ethics submission.

      *Focus: RCT design · Power calculations · Research ethics*

      #### Portfolio Oversight
      * Cross-portfolio technical reviewer and standards owner

      Analytical oversight across IDinsight's India health, nutrition,
      and agriculture portfolio — the technical review point for
      analysis, data-quality decisions, and reporting, ensuring
      consistent rigour across projects. Established organisation-wide
      R coding standards and authored IDinsight's institutional
      guidelines on the responsible use of AI tools for qualitative
      research, covering Dedoose, MaxQDA, Atlas.ti, and
      large-language-model workflows. Mentor associates and managers
      to build their technical skills.

      *Focus: Technical review · Coding standards · AI for qualitative research*
